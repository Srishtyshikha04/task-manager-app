<!DOCTYPE html>
<html>
<head>
    <title>Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center">Projects</h2>

    {% if session['role'] == 'admin' %}
    <form action="/create_project" method="POST" class="mt-4">
        <input type="text" name="project_name" class="form-control mb-2" placeholder="Project Name" required>
        <button class="btn btn-primary w-100">Create Project</button>
    </form>
    {% endif %}

    <ul class="list-group mt-4">
        {% for project in projects %}
            <li class="list-group-item">{{ project.name }}</li>
        {% endfor %}
    </ul>

    <a href="/dashboard" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
