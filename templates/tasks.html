<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center">Tasks</h2>

    {% if session['role'] == 'admin' %}
    <form action="/create_task" method="POST" class="mt-4">

        <input type="text" name="title" class="form-control mb-2" placeholder="Task Title" required>

        <select name="status" class="form-control mb-2">
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
        </select>

        <input type="date" name="due_date" class="form-control mb-2">

        <select name="project_id" class="form-control mb-2">
            {% for project in projects %}
                <option value="{{ project.id }}">{{ project.name }}</option>
            {% endfor %}
        </select>

        <select name="assigned_to" class="form-control mb-2">
            {% for user in users %}
                <option value="{{ user.id }}">{{ user.name }}</option>
            {% endfor %}
        </select>

        <button class="btn btn-success w-100">Add Task</button>
    </form>
    {% endif %}

    <ul class="list-group mt-4">
        {% for task in tasks %}
            <li class="list-group-item 
                {% if task.status == 'completed' %}list-group-item-success{% endif %}
                {% if task.is_overdue %}list-group-item-danger{% endif %}
            ">
                {{ task.title }} | {{ task.project_name }} | {{ task.status }} | {{ task.due_date }}
            </li>
        {% endfor %}
    </ul>

    <a href="/dashboard" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
